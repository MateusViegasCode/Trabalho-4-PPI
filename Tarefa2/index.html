<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente - Trabalho 4</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Cadastro de Cliente</h1>

        <form id="form-cadastro" action="cadastraCliente.php" method="post" enctype="multipart/form-data">

            <input type="hidden" name="identificador_formulario" value="form_trabalho3_ppi">

            <fieldset>
                <legend>Dados Pessoais</legend>

                <p>
                    <label for="id-nome">Nome *:</label>
                    <input type="text" id="id-nome" name="nome" minlength="2" maxlength="50"
                        placeholder="Digite seu nome completo" required autofocus>
                    <span class="validacao"></span>
                </p>

                <p>
                    <label for="id-email">E-mail *:</label>
                    <input type="email" id="id-email" name="email" required>
                    <span class="validacao"></span>
                </p>

                <p>
                    <label for="id-cpf">CPF *:</label>
                    <input type="text" id="id-cpf" name="cpf" pattern="[0-9]{3}\.[0-9]{3}\.[0-9]{3}-[0-9]{2}"
                        placeholder="000.000.000-00" required>
                    <span class="validacao"></span>
                </p>

                <p>
                    <label for="id-idade">Idade *:</label>
                    <input type="number" id="id-idade" name="idade" required>
                    <span class="validacao"></span>
                </p>

                <p>
                    <label for="id-telefone">Telefone *:</label>
                    <input type="tel" id="id-telefone" name="telefone" required>
                    <span class="validacao"></span>
                </p>

                <p>
                    <label for="id-nascimento">Data de Nascimento:</label>
                    <input type="date" id="id-nascimento" name="nascimento">
                </p>

                <p>
                    Sexo:
                    <input type="radio" id="sexo-m" name="sexo" value="M">
                    <label for="sexo-m">Masculino</label>

                    <input type="radio" id="sexo-f" name="sexo" value="F">
                    <label for="sexo-f">Feminino</label>
                </p>

                <p>
                    <label for="id-estadocivil">Estado Civil:</label>
                    <input type="text" id="id-estadocivil" name="estadocivil">
                </p>

                <p>
                    <label for="id-pais">País de Origem:</label>
                    <input type="text" id="id-pais" name="pais" value="Brasil" readonly>
                </p>
            </fieldset>

            <fieldset>
                <legend>Endereço de Entrega</legend>

                <p>
                    <label for="id-cep">CEP *:</label>
                    <input type="text" id="id-cep" name="cep" required>
                    <span class="validacao"></span>
                </p>

                <p>
                    <label for="id-tipologradouro">Tipo de Logradouro *:</label>
                    <select id="id-tipologradouro" name="tipologradouro" required>
                        <option value="">Selecione...</option>
                        <option value="rua">Rua</option>
                        <option value="avenida">Avenida</option>
                        <option value="praca">Praça</option>
                        <option value="outro">Outro</option>
                    </select>
                </p>

                <p>
                    <label for="id-logradouro">Logradouro *:</label>
                    <input type="text" id="id-logradouro" name="logradouro" required>
                    <span class="validacao"></span>
                </p>

                <p>
                    <label for="id-bairro">Bairro *:</label>
                    <input type="text" id="id-bairro" name="bairro" required>
                    <span class="validacao"></span>
                </p>

                <p>
                    <label for="id-cidade">Cidade *:</label>
                    <input type="text" id="id-cidade" name="cidade" required>
                    <span class="validacao"></span>
                </p>

                <p>
                    <label for="id-estado">Estado *:</label>
                    <input type="text" id="id-estado" name="estado" required>
                    <span class="validacao"></span>
                </p>
            </fieldset>

            <fieldset>
                <legend>Informações Adicionais</legend>

                <p>
                    Campos de interesse:<br>
                    <input type="checkbox" id="int-filmes" name="interesses[]" value="filmes">
                    <label for="int-filmes">Filmes</label><br>

                    <input type="checkbox" id="int-informatica" name="interesses[]" value="informatica">
                    <label for="int-informatica">Informática</label><br>

                    <input type="checkbox" id="int-games" name="interesses[]" value="games">
                    <label for="int-games">Games</label><br>

                    <input type="checkbox" id="int-livros" name="interesses[]" value="livros">
                    <label for="int-livros">Livros</label><br>

                    <input type="checkbox" id="int-roupas" name="interesses[]" value="roupas">
                    <label for="int-roupas">Roupas</label>
                </p>

                <p>
                    <label for="id-complementares">Informações Complementares:</label><br>
                    <textarea id="id-complementares" name="complementares" rows="4" cols="50"></textarea>
                </p>

                <p>
                    <label for="id-imagem">Anexar Imagem de Perfil:</label>
                    <input type="file" id="id-imagem" name="imagem" accept="image/*">
                </p>
            </fieldset>

            <p>
                <button type="submit">Enviar Cadastro</button>
            </p>

        </form>
    </div>

</body>
</html>
